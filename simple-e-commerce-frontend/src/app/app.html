<main class="se-page">
  <section class="se-shell se-nav-wrap">
    <header class="se-nav" aria-label="Store navigation">
      <div class="se-nav-top">
        <div class="se-brand">
          <div class="se-brand-mark" aria-hidden="true">
            <span class="material-icons-outlined se-mi">storefront</span>
          </div>
          <div class="se-brand-copy">
            <span class="se-brand-name">{{ title() }}</span>
            <span class="se-brand-tag">{{ t('brand.tagline') }}</span>
          </div>
        </div>

        <div class="se-search-row">
          <label class="se-search" for="store-search">
            <span class="material-icons-outlined se-mi se-search-icon" aria-hidden="true">search</span>
            <input
              id="store-search"
              class="se-search-input"
              type="search"
              [placeholder]="t('search.placeholder')"
            />
          </label>

          <button class="se-btn se-btn-pri" type="button">
            <span class="material-icons-outlined se-mi se-mi-sm" aria-hidden="true">search</span>
            <span>{{ t('search.action') }}</span>
          </button>
        </div>

        <div class="se-nav-actions">
          <button class="se-icon-btn" type="button">
            <span class="material-icons-outlined se-mi se-mi-sm" aria-hidden="true">person</span>
            <span>{{ t(accountLabelKey()) }}</span>
          </button>
          <button class="se-icon-btn" type="button">
            <span class="material-icons-outlined se-mi se-mi-sm" aria-hidden="true">shopping_cart</span>
            <span>{{ t('nav.cart') }}</span>
            <span class="se-icon-badge">2</span>
          </button>
        </div>

        <div class="se-nav-strip-group">
          @for (language of languages; track language.code) {
            <button
              class="se-lang-btn"
              type="button"
              [attr.aria-label]="t(language.ariaKey)"
              [class.se-lang-btn-active]="currentLanguage() === language.code"
              (click)="switchLanguage(language.code)"
            >
              <img
                class="se-flag"
                [src]="language.flagPath"
                [alt]="language.label"
                width="18"
                height="14"
              />
              <span>{{ language.label }}</span>
            </button>
          }
        </div>
      </div>

      <div class="se-nav-bottom">
        <nav class="se-nav-links" aria-label="Primary">
          <button class="se-nav-link se-nav-link-pri" type="button">
            <span class="material-icons-outlined se-mi se-mi-sm" aria-hidden="true">home</span>
            <span>{{ t('nav.home') }}</span>
          </button>
          @for (link of navLinks; track link.labelKey) {
            <button class="se-nav-link" type="button">
              <span class="se-nav-link-icon">
                <span class="material-icons-outlined se-mi se-mi-sm" aria-hidden="true">{{ link.icon }}</span>
              </span>
              <span>{{ t(link.labelKey) }}</span>
            </button>
          }
        </nav>

        <div class="se-nav-meta" aria-label="Store promises">
          @for (item of navMeta; track item.labelKey) {
            <span class="se-nav-meta-item">
              <span class="material-icons-outlined se-mi se-mi-sm" aria-hidden="true">{{ item.icon }}</span>
              <span>{{ t(item.labelKey) }}</span>
            </span>
          }
        </div>
      </div>
    </header>
  </section>

  <section class="se-shell se-route">
    <router-outlet />
  </section>
</main>

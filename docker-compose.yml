services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-CU23-ubuntu-22.04
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${APP_SA_PASSWORD}
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - default
    healthcheck:
      test:
        [
          "CMD-SHELL",
          '/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1" || exit 1',
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-CU23-ubuntu-22.04
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: ${APP_SA_PASSWORD}
    volumes:
      - ./docker/sqlserver/init.sql:/scripts/init.sql:ro
    entrypoint: >
      /bin/bash -c "
      /opt/mssql-tools18/bin/sqlcmd
      -S sqlserver
      -U sa
      -P \"$$MSSQL_SA_PASSWORD\"
      -C
      -i /scripts/init.sql
      "
    restart: "no"
    networks:
      - default

  redis:
    image: redis:8.6.1
    command: ["redis-server", "--requirepass", "${APP_REDIS_PASSWORD}"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - default

  keycloak-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${KEYCLOAK_POSTGRES_DB}
      POSTGRES_USER: ${KEYCLOAK_POSTGRES_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - keycloak_data:/var/lib/postgresql/data
    networks:
      - default

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/${KEYCLOAK_POSTGRES_DB}
      KC_DB_USERNAME: ${KEYCLOAK_POSTGRES_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8080
      KC_HTTP_ENABLED: true
      KC_HOSTNAME_STRICT_HTTPS: false
    volumes:
      - ./keycloak-theme:/opt/keycloak/themes/simple-e-commerce
    command: start-dev
    ports:
      - "8080:8080"
    depends_on:
      - keycloak-db
    networks:
      - default

  backend:
    build:
      context: ./SimpleECommerceBackend
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    depends_on:
      - sqlserver
      - redis
      - keycloak
    restart: unless-stopped
    networks:
      - default

  frontend:
    build:
      context: ./simple-e-commerce-frontend
      dockerfile: Dockerfile
      network: host
    ports:
      - "4201:80"
    restart: unless-stopped
    networks:
      - default

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    depends_on:
      - keycloak
      - sqlserver
    restart: unless-stopped
    networks:
      - default
    profiles:
      - tunnel

volumes:
  redis_data:
  sqlserver_data:
  keycloak_data:

networks:
  default:
    driver: bridge
